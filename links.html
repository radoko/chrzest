<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Linki zaproszeń — panel</title>
  <style>
    :root { font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #2d3a4a; }
    body { background: #f6f3ee; margin: 0; padding: 32px 16px; }
    main { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 10px 30px -15px rgba(0,0,0,.25); padding: 24px; }
    h1 { font-weight: 600; margin: 0 0 6px; }
    p.lede { color: #55657a; margin: 0 0 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: top; }
    th { background: #f0f5fb; font-weight: 600; color: #4d7cb0; text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
    td.link { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12.5px; word-break: break-all; color: #4d7cb0; }
    button { cursor: pointer; border: 1px solid #d0dae6; background: #fff; padding: 4px 10px; border-radius: 999px; font-size: 12px; color: #4d7cb0; }
    button:hover { background: #4d7cb0; color: #fff; border-color: #4d7cb0; }
    .base { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
    .base input { flex: 1; padding: 8px 10px; border: 1px solid #d0dae6; border-radius: 6px; font-size: 13px; }
    tr.group { background: #fbfaf6; }
    small { color: #7f8b9a; }
  </style>
</head>
<body>
  <main>
    <h1>Linki zaproszeń</h1>
    <p class="lede">Każdy gość/rodzina dostaje swój spersonalizowany link. Po otwarciu hash zostaje zapamiętany w przeglądarce.</p>

    <div class="base">
      <label for="base">Bazowy URL:</label>
      <input id="base" type="text" />
      <button id="reset">Auto</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Goście</th>
          <th>Kod</th>
          <th>Link</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p><small>Liczba zaproszeń: <span id="count">0</span></small></p>
  </main>

  <script>
    const baseInput = document.getElementById("base");
    const rows = document.getElementById("rows");
    const countEl = document.getElementById("count");

    function defaultBase() {
      const u = new URL(window.location.href);
      u.pathname = u.pathname.replace(/links\.html$/, "");
      u.search = "";
      u.hash = "";
      return u.toString();
    }

    baseInput.value = defaultBase();
    document.getElementById("reset").addEventListener("click", () => {
      baseInput.value = defaultBase();
      render();
    });
    baseInput.addEventListener("input", render);

    let data;
    fetch("guests.json").then((r) => r.json()).then((d) => { data = d; render(); });

    function render() {
      if (!data) return;
      const base = baseInput.value.replace(/#.*$/, "").replace(/\?.*$/, "");
      rows.innerHTML = "";
      const entries = Object.entries(data.guests);
      countEl.textContent = entries.length;
      for (const [code, g] of entries) {
        const link = base + "#" + code;
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + g.names.join("<br>") + "</td>" +
          "<td><code>" + code + "</code></td>" +
          "<td class=\"link\">" + link + "</td>" +
          "<td><button>Kopiuj</button></td>";
        tr.querySelector("button").addEventListener("click", () => {
          navigator.clipboard.writeText(link).then(() => {
            const b = tr.querySelector("button");
            const old = b.textContent;
            b.textContent = "✓";
            setTimeout(() => (b.textContent = old), 1200);
          });
        });
        rows.appendChild(tr);
      }
    }
  </script>
</body>
</html>
